<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食事 & 断食 ビジュアライザー — ippo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose:       #c9747a;
  --rose-light: #f0d5d7;
  --rose-pale:  #fdf3f3;
  --sage:       #8aab96;
  --sage-light: #d6e8dd;
  --warm:       #e8c49a;
  --warm-pale:  #fdf6ee;
  --ink:        #2c2420;
  --ink-mid:    #5a4a44;
  --ink-light:  #9a8880;
  --cream:      #faf6f2;
  --white:      #ffffff;
  --shadow:     rgba(44,36,32,0.09);

  /* food category colors */
  --col-carb:    #e8b89a;
  --col-protein: #c9747a;
  --col-veg:     #8aab96;
  --col-fat:     #e8d49a;
  --col-drink:   #9ab8c9;
  --col-sweet:   #c49ac9;
  --col-other:   #b8b0aa;

  /* fasting ring */
  --col-eating:  #c9747a;
  --col-fasting: #2c2420;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Page shell ── */
.page {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 14px;
  background: var(--cream);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid rgba(200,180,170,.15);
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--white);
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px var(--shadow);
  flex-shrink: 0;
}
.header-title { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--ink); }
.header-sub   { font-size: 11px; color: var(--ink-light); margin-top: 1px; }

/* ── Input card ── */
.input-card {
  margin: 16px;
  background: var(--white);
  border-radius: 24px;
  padding: 22px;
  box-shadow: 0 4px 20px var(--shadow);
}
.ic-label {
  font-size: 10px;
  letter-spacing: .22em;
  color: var(--rose);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.ic-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 17px;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 16px;
}
.ic-textarea {
  width: 100%;
  border: 1.5px solid #ede5e0;
  border-radius: 14px;
  padding: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
  background: var(--cream);
  resize: none;
  min-height: 120px;
  outline: none;
  transition: border-color .2s;
}
.ic-textarea:focus { border-color: var(--rose); background: #fff; }
.ic-textarea::placeholder { color: var(--ink-light); font-size: 13px; }

.ic-hint {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 10px 0 16px;
}
.hint-chip {
  font-size: 11px;
  padding: 5px 10px;
  background: var(--warm-pale);
  border-radius: 20px;
  color: var(--ink-mid);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  user-select: none;
}
.hint-chip:active { background: var(--rose-pale); border-color: var(--rose-light); }

/* ── Time inputs ── */
.time-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}
.time-field {
  flex: 1;
  background: var(--cream);
  border: 1.5px solid #ede5e0;
  border-radius: 12px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.time-field label {
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: .05em;
}
.time-field input[type="time"] {
  border: none;
  background: transparent;
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  color: var(--ink);
  outline: none;
  width: 100%;
}

/* ── Analyze button ── */
.analyze-btn {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.analyze-btn:hover { background: var(--rose); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,116,122,.35); }
.analyze-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

/* loading shimmer */
.analyze-btn .shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
  transform: translateX(-100%);
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { to { transform: translateX(100%); } }

/* ── Loading state ── */
.loading-section {
  display: none;
  padding: 24px;
  text-align: center;
}
.loading-section.active { display: block; }
.loading-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 14px;
}
.loading-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--rose);
  animation: bounce 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,80%,100% { transform: scale(.6); opacity: .5; }
  40%         { transform: scale(1);   opacity: 1; }
}
.loading-text { font-size: 13px; color: var(--ink-light); line-height: 1.8; }

/* ── Result section ── */
.result-section {
  display: none;
  padding: 0 16px 80px;
}
.result-section.active { display: block; }

/* ── Donut chart wrapper ── */
.donut-wrap {
  background: var(--white);
  border-radius: 24px;
  padding: 24px 20px;
  box-shadow: 0 4px 20px var(--shadow);
  margin-bottom: 14px;
}
.dw-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dw-icon { font-size: 18px; }

.chart-row {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 18px;
}
.svg-wrap {
  flex-shrink: 0;
  position: relative;
  width: 140px; height: 140px;
}
.donut-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
.donut-center-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.dct-main { font-family: 'Shippori Mincho', serif; font-size: 22px; color: var(--ink); line-height: 1; }
.dct-sub  { font-size: 10px; color: var(--ink-light); margin-top: 3px; }

/* legend */
.legend { flex: 1; display: flex; flex-direction: column; gap: 7px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transform: translateX(8px);
  animation: legendIn .4s ease forwards;
}
@keyframes legendIn { to { opacity: 1; transform: none; } }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.legend-name { font-size: 12px; color: var(--ink-mid); flex: 1; }
.legend-pct  { font-size: 12px; color: var(--ink); font-weight: 500; font-family: 'Shippori Mincho', serif; }

/* divider */
.chart-divider {
  height: 1px;
  background: rgba(200,180,170,.2);
  margin: 16px 0;
}

/* ── AI commentary ── */
.ai-comment-card {
  background: linear-gradient(135deg, var(--rose-pale), var(--warm-pale));
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 14px;
  border-left: 3px solid var(--rose);
}
.acc-label { font-size: 10px; letter-spacing: .2em; color: var(--rose); margin-bottom: 10px; text-transform: uppercase; }
.acc-text  { font-family: 'Shippori Mincho', serif; font-size: 15px; line-height: 1.9; color: var(--ink); }

/* ── Meal timeline ── */
.timeline-card {
  background: var(--white);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 16px var(--shadow);
  margin-bottom: 14px;
}
.tc-title { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--ink); margin-bottom: 16px; }
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item {
  display: flex;
  gap: 14px;
  position: relative;
}
.tl-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 17px;
  top: 32px;
  bottom: -8px;
  width: 2px;
  background: rgba(200,180,170,.25);
}
.tl-dot-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 36px;
  flex-shrink: 0;
}
.tl-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-bottom: 8px;
}
.tl-content { flex: 1; padding-bottom: 20px; }
.tl-time  { font-size: 11px; color: var(--ink-light); margin-bottom: 2px; }
.tl-label { font-size: 14px; color: var(--ink); font-weight: 500; margin-bottom: 4px; }
.tl-items { font-size: 12px; color: var(--ink-mid); line-height: 1.6; }
.tl-fast  {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(44,36,32,.04);
  border-radius: 10px;
  font-size: 12px;
  color: var(--ink-light);
}

/* ── Nutrient bar ── */
.nutrient-section {
  background: var(--white);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 16px var(--shadow);
  margin-bottom: 14px;
}
.ns-title { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--ink); margin-bottom: 16px; }
.nutrient-row { margin-bottom: 12px; }
.nr-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.nr-name   { font-size: 12px; color: var(--ink-mid); }
.nr-score  { font-size: 12px; color: var(--ink); font-weight: 500; }
.nr-bar-bg { height: 6px; background: #f0ebe6; border-radius: 10px; overflow: hidden; }
.nr-bar-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 1.2s cubic-bezier(.23,1,.32,1);
}

/* ── Error ── */
.error-card {
  margin: 16px;
  background: #fde8e8;
  border-radius: 18px;
  padding: 20px;
  display: none;
  border-left: 3px solid var(--rose);
}
.error-card.active { display: block; }
.error-title { font-size: 14px; font-weight: 500; color: var(--rose); margin-bottom: 6px; }
.error-text  { font-size: 12px; color: var(--ink-mid); line-height: 1.7; }

/* ── Save button ── */
.save-btn {
  width: 100%;
  padding: 16px;
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all .3s;
  display: none;
}
.save-btn.active { display: block; }
.save-btn:hover  { background: #b8666c; transform: translateY(-1px); }

.retry-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--ink-light);
  border: 1.5px solid #ede5e0;
  border-radius: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 10px;
  display: none;
  transition: all .2s;
}
.retry-btn.active { display: block; }
.retry-btn:hover  { border-color: var(--rose-light); color: var(--rose); }

/* ── Scroll top / spacing ── */
.spacer { height: 20px; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="history.back()">←</button>
    <div>
      <div class="header-title">食事 & 断食 アナライザー</div>
      <div class="header-sub">テキストを入力するだけでグラフ化</div>
    </div>
  </div>

  <!-- Input card -->
  <div class="input-card">
    <div class="ic-label">MEAL ANALYZER</div>
    <div class="ic-title">今日食べたものを<br>自由に入力してください</div>

    <textarea class="ic-textarea" id="meal-input"
      placeholder="例：
朝7時 ご飯・味噌汁・納豆・ほうれん草炒め
昼12時 鶏むね肉のサラダ、ゆで卵2個、水
夜19時 豆腐の味噌汁・サバ塩焼き・ひじき煮
21時 ヨーグルト、ブルーベリー"></textarea>

    <div class="ic-hint">
      <span class="hint-chip" onclick="insertHint('朝 ')">朝</span>
      <span class="hint-chip" onclick="insertHint('昼 ')">昼</span>
      <span class="hint-chip" onclick="insertHint('夜 ')">夜</span>
      <span class="hint-chip" onclick="insertHint('間食 ')">間食</span>
      <span class="hint-chip" onclick="insertHint('水・お茶 ')">水分</span>
      <span class="hint-chip" onclick="insertHint('プロテイン ')">プロテイン</span>
    </div>

    <div class="time-row">
      <div class="time-field">
        <label>最初の食事</label>
        <input type="time" id="first-meal" value="07:30">
      </div>
      <div class="time-field">
        <label>最後の食事</label>
        <input type="time" id="last-meal" value="19:00">
      </div>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
      <span>🔍</span>
      <span>AIで分析する</span>
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-section" id="loading">
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <div class="loading-text" id="loading-text">
      食事内容を読み取っています…
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card">
    <div class="error-title">⚠️ 解析できませんでした</div>
    <div class="error-text" id="error-text">もう一度お試しください。</div>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section">

    <!-- AI Comment -->
    <div class="ai-comment-card" id="ai-comment">
      <div class="acc-label">✦ AI からのコメント</div>
      <div class="acc-text" id="ai-comment-text"></div>
    </div>

    <!-- Food donut -->
    <div class="donut-wrap">
      <div class="dw-title"><span class="dw-icon">🍱</span> 食事カテゴリー内訳</div>
      <div class="chart-row">
        <div class="svg-wrap">
          <svg class="donut-svg" id="food-svg" viewBox="0 0 120 120"></svg>
          <div class="donut-center-text">
            <div class="dct-main" id="food-center-main">—</div>
            <div class="dct-sub">食品種類</div>
          </div>
        </div>
        <div class="legend" id="food-legend"></div>
      </div>
    </div>

    <!-- Fasting donut -->
    <div class="donut-wrap">
      <div class="dw-title"><span class="dw-icon">⏱</span> 断食 vs 食事時間</div>
      <div class="chart-row">
        <div class="svg-wrap">
          <svg class="donut-svg" id="fast-svg" viewBox="0 0 120 120"></svg>
          <div class="donut-center-text">
            <div class="dct-main" id="fast-center-main">—</div>
            <div class="dct-sub">断食時間</div>
          </div>
        </div>
        <div class="legend" id="fast-legend"></div>
      </div>
    </div>

    <!-- Meal timeline -->
    <div class="timeline-card">
      <div class="tc-title">🕐 食事タイムライン</div>
      <div class="timeline" id="meal-timeline"></div>
    </div>

    <!-- Nutrient balance -->
    <div class="nutrient-section">
      <div class="ns-title">🌿 栄養バランス (AI推定)</div>
      <div id="nutrient-bars"></div>
    </div>

    <!-- Buttons -->
    <button class="save-btn active" id="save-btn" onclick="saveAndClose()">この記録を保存する 🌸</button>
    <button class="retry-btn active" onclick="resetForm()">↩ 入力し直す</button>
  </div>

</div>

<script>
// ── helpers ──────────────────────────────────────────────────
function insertHint(text) {
  const ta = document.getElementById('meal-input');
  const v = ta.value;
  if (v && !v.endsWith('\n')) ta.value = v + '\n' + text;
  else ta.value = v + text;
  ta.focus();
}

// ── loading messages ──────────────────────────────────────────
const loadingMsgs = [
  '食事内容を読み取っています…',
  '食品カテゴリーを分類中…',
  '断食時間を計算しています…',
  'グラフデータを生成中…',
  'AIコメントを作成中…',
];
let loadMsgIdx = 0, loadMsgInterval = null;
function startLoadingMessages() {
  loadMsgIdx = 0;
  document.getElementById('loading-text').textContent = loadingMsgs[0];
  loadMsgInterval = setInterval(() => {
    loadMsgIdx = (loadMsgIdx + 1) % loadingMsgs.length;
    document.getElementById('loading-text').textContent = loadingMsgs[loadMsgIdx];
  }, 1600);
}
function stopLoadingMessages() { clearInterval(loadMsgInterval); }

// ── UI state ──────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading').classList.toggle('active', on);
  document.getElementById('analyze-btn').disabled = on;
  if (on) {
    const btn = document.getElementById('analyze-btn');
    btn.innerHTML = '<div class="shimmer"></div><span>解析中…</span>';
    startLoadingMessages();
    document.getElementById('result-section').classList.remove('active');
    document.getElementById('error-card').classList.remove('active');
  } else {
    stopLoadingMessages();
    document.getElementById('analyze-btn').innerHTML = '<span>🔍</span><span>AIで分析する</span>';
  }
}

function showError(msg) {
  setLoading(false);
  document.getElementById('error-card').classList.add('active');
  document.getElementById('error-text').textContent = msg;
}

// ── donut chart ───────────────────────────────────────────────
function buildDonut(svgId, segments) {
  // segments: [{color, pct, label}]
  const svg = document.getElementById(svgId);
  svg.innerHTML = '';
  const cx = 60, cy = 60, r = 46, strokeW = 14;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  segments.forEach((seg, i) => {
    if (seg.pct <= 0) return;
    const len   = circ * seg.pct / 100;
    const gap   = circ * 0.008; // tiny gap
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', seg.color);
    circle.setAttribute('stroke-width', strokeW);
    circle.setAttribute('stroke-dasharray', `${Math.max(0, len - gap)} ${circ - (len - gap)}`);
    circle.setAttribute('stroke-dashoffset', -offset);
    circle.setAttribute('stroke-linecap', 'round');
    circle.style.transition = `stroke-dasharray 1.1s cubic-bezier(.23,1,.32,1) ${i * .08}s`;
    svg.appendChild(circle);
    offset += len;
  });
}

function buildLegend(legendId, segments) {
  const el = document.getElementById(legendId);
  el.innerHTML = segments.filter(s => s.pct > 0).map((s, i) => `
    <div class="legend-item" style="animation-delay:${i * .07}s">
      <div class="legend-dot" style="background:${s.color}"></div>
      <div class="legend-name">${s.label}</div>
      <div class="legend-pct">${Math.round(s.pct)}%</div>
    </div>
  `).join('');
}

// ── nutrient bars ─────────────────────────────────────────────
function buildNutrientBars(nutrients) {
  // nutrients: [{name, score, color}]  score 0–100
  const el = document.getElementById('nutrient-bars');
  el.innerHTML = nutrients.map(n => `
    <div class="nutrient-row">
      <div class="nr-header">
        <span class="nr-name">${n.name}</span>
        <span class="nr-score">${n.score}/100</span>
      </div>
      <div class="nr-bar-bg">
        <div class="nr-bar-fill" style="width:0%; background:${n.color}" data-target="${n.score}%"></div>
      </div>
    </div>
  `).join('');
  // animate after paint
  requestAnimationFrame(() => {
    el.querySelectorAll('.nr-bar-fill').forEach(b => {
      b.style.width = b.dataset.target;
    });
  });
}

// ── timeline ──────────────────────────────────────────────────
function buildTimeline(meals, fastHours) {
  const icons = { '朝': '🌅', '昼': '☀️', '夜': '🌙', '間食': '🍵', '断食': '⏳' };
  const colors = { '朝': '#f9edd8', '昼': '#d6e8dd', '夜': '#fdf3f3', '間食': '#ede5e0', '断食': '#f0f0ee' };
  const el = document.getElementById('meal-timeline');
  let html = '';
  meals.forEach((m, i) => {
    const ic = icons[m.type] || '🍽';
    const bg = colors[m.type] || '#f0ebe6';
    html += `
      <div class="tl-item">
        <div class="tl-dot-wrap">
          <div class="tl-dot" style="background:${bg}">${ic}</div>
        </div>
        <div class="tl-content">
          <div class="tl-time">${m.time || ''}</div>
          <div class="tl-label">${m.type}</div>
          <div class="tl-items">${m.items}</div>
        </div>
      </div>`;
    if (i < meals.length - 1 && m.fastAfter) {
      html += `
        <div class="tl-item">
          <div class="tl-dot-wrap">
            <div class="tl-dot" style="background:#f0f0ee">⏳</div>
          </div>
          <div class="tl-content" style="padding-bottom:20px">
            <div class="tl-fast">断食 ${m.fastAfter}</div>
          </div>
        </div>`;
    }
  });
  el.innerHTML = html;
}

// ── main analyze ─────────────────────────────────────────────
async function analyze() {
  const mealText = document.getElementById('meal-input').value.trim();
  if (!mealText) {
    document.getElementById('meal-input').focus();
    document.getElementById('meal-input').style.borderColor = 'var(--rose)';
    setTimeout(() => document.getElementById('meal-input').style.borderColor = '', 1500);
    return;
  }

  const firstMeal = document.getElementById('first-meal').value;
  const lastMeal  = document.getElementById('last-meal').value;

  setLoading(true);

  const prompt = `あなたは管理栄養士AIです。以下の食事記録を詳しく分析してください。

食事記録:
${mealText}

最初の食事時刻: ${firstMeal}
最後の食事時刻: ${lastMeal}

以下のJSON形式で回答してください（JSONのみ、他のテキストは不要）:

{
  "foodCategories": [
    {"label": "炭水化物・主食", "pct": 数値(0-100), "color": "#e8b89a"},
    {"label": "タンパク質", "pct": 数値, "color": "#c9747a"},
    {"label": "野菜・食物繊維", "pct": 数値, "color": "#8aab96"},
    {"label": "脂質・ナッツ", "pct": 数値, "color": "#e8d49a"},
    {"label": "飲み物", "pct": 数値, "color": "#9ab8c9"},
    {"label": "甘いもの", "pct": 数値, "color": "#c49ac9"},
    {"label": "その他", "pct": 数値, "color": "#b8b0aa"}
  ],
  "fastingHours": 数値（小数可）,
  "eatingHours": 数値（小数可）,
  "fastingPct": 数値（24時間中の断食割合）,
  "eatingPct": 数値（24時間中の食事時間割合）,
  "meals": [
    {
      "type": "朝|昼|夜|間食",
      "time": "HH:MM",
      "items": "食べたものの簡潔な説明",
      "fastAfter": "次の食事まで X時間Y分" または null
    }
  ],
  "nutrients": [
    {"name": "タンパク質", "score": 数値(0-100), "color": "#c9747a"},
    {"name": "食物繊維", "score": 数値, "color": "#8aab96"},
    {"name": "鉄分", "score": 数値, "color": "#c9747a"},
    {"name": "ビタミンD", "score": 数値, "color": "#e8c49a"},
    {"name": "オメガ3", "score": 数値, "color": "#9ab8c9"},
    {"name": "発酵食品", "score": 数値, "color": "#e8d49a"}
  ],
  "aiComment": "この食事記録へのやさしいコメント。卵巣・ホルモンバランスの観点から、良かった点と1つだけ改善提案。2〜3文。Shippori Minchoフォントで表示するのでポエティックに。"
}

pctの合計は必ず100になるようにすること。fastingHoursはfirstMealからlastMealを24時間から引いた値。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    const raw = data.content?.find(c => c.type === 'text')?.text || '';

    // parse JSON
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON not found in response');
    const parsed = JSON.parse(jsonMatch[0]);

    setLoading(false);
    renderResult(parsed);

  } catch (err) {
    console.error(err);
    showError(`解析に失敗しました。もう一度お試しください。\n(${err.message})`);
  }
}

// ── render ────────────────────────────────────────────────────
function renderResult(d) {
  // Food donut
  const foodSegs = d.foodCategories.filter(s => s.pct > 0);
  buildDonut('food-svg', foodSegs);
  buildLegend('food-legend', foodSegs);
  const topFood = foodSegs.sort((a, b) => b.pct - a.pct)[0];
  document.getElementById('food-center-main').textContent = foodSegs.length;

  // Fasting donut
  const fastSegs = [
    { color: 'var(--col-fasting)', pct: d.fastingPct, label: `断食 ${d.fastingHours}h` },
    { color: 'var(--col-eating)',  pct: d.eatingPct,  label: `食事時間 ${d.eatingHours}h` },
  ];
  buildDonut('fast-svg', fastSegs);
  buildLegend('fast-legend', fastSegs);
  document.getElementById('fast-center-main').textContent = `${d.fastingHours}h`;

  // Timeline
  buildTimeline(d.meals, d.fastingHours);

  // Nutrients
  buildNutrientBars(d.nutrients);

  // AI comment
  document.getElementById('ai-comment-text').textContent = d.aiComment;

  // Show result
  document.getElementById('result-section').classList.add('active');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetForm() {
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('error-card').classList.remove('active');
  document.getElementById('meal-input').value = '';
  document.getElementById('meal-input').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveAndClose() {
  alert('記録を保存しました 🌸\nメインアプリに反映されます。');
}
</script>
